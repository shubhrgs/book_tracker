<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SwanSong — Reading Tracker</title>
<link rel="manifest" href="manifest.json">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f5f4f0; --bg3: #e8e7e3;
  --text: #1a1a1a; --text2: #555; --text3: #999;
  --border: rgba(0,0,0,0.11); --border2: rgba(0,0,0,0.2);
  --info-bg: #e6f1fb; --info-text: #185fa5; --info-border: #85b7eb;
  --danger-bg: #fcebeb; --danger-text: #a32d2d; --danger-border: #f09595;
  --success-bg: #E1F5EE; --success: #1D9E75;
  --warn-bg: #FAEEDA; --warn: #EF9F27;
  --radius-md: 8px; --radius-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1e1e1e; --bg2: #282828; --bg3: #2e2e2e;
    --text: #f0f0f0; --text2: #aaa; --text3: #666;
    --border: rgba(255,255,255,0.09); --border2: rgba(255,255,255,0.18);
    --info-bg: #0c2a42; --info-text: #85b7eb; --info-border: #185fa5;
    --danger-bg: #2e1212; --danger-text: #f09595; --danger-border: #a32d2d;
    --success-bg: #0a3326; --success: #1D9E75;
    --warn-bg: #3a2800; --warn: #EF9F27;
  }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }

/* ── header ── */
header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 0.85rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; gap: 12px; }
.logo { font-size: 17px; font-weight: 500; letter-spacing: -0.3px; white-space: nowrap; }
.logo span { color: var(--text2); font-weight: 400; font-size: 13px; margin-left: 8px; }
.hdr-actions { display: flex; align-items: center; gap: 8px; }
.btn { font-size: 12px; padding: 6px 13px; border-radius: var(--radius-md); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); cursor: pointer; white-space: nowrap; }
.btn:hover { background: var(--bg2); }
.btn-primary { background: var(--info-bg); color: var(--info-text); border-color: var(--info-border); }
.btn-primary:hover { opacity: 0.85; }
.save-flash { font-size: 12px; color: var(--success); opacity: 0; transition: opacity 0.3s; }

/* ── add-book panel ── */
.add-panel { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 1rem 1.5rem; display: none; }
.add-panel.open { display: block; }
.add-grid { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; align-items: end; }
@media(max-width:640px){ .add-grid { grid-template-columns: 1fr 1fr; } }
@media(max-width:420px){ .add-grid { grid-template-columns: 1fr; } }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.4px; }
.field input, .field select { font-size: 13px; padding: 6px 10px; border-radius: var(--radius-md); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); outline: none; width: 100%; }
.field input:focus, .field select:focus { border-color: var(--info-border); }
.new-cat-row { margin-top: 8px; display: none; }
.new-cat-row.open { display: flex; gap: 10px; align-items: center; }
.new-cat-row input { font-size: 13px; padding: 6px 10px; border-radius: var(--radius-md); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); outline: none; flex: 1; max-width: 280px; }
.add-err { font-size: 12px; color: var(--danger-text); margin-top: 6px; display: none; }

/* ── main container ── */
.container { max-width: 880px; margin: 0 auto; padding: 1.25rem 1rem 4rem; }

/* ── stats ── */
.stats-row { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 1.1rem; }
@media(max-width:480px){ .stats-row { grid-template-columns: repeat(2,1fr); } }
.stat-card { background: var(--bg); border-radius: var(--radius-md); padding: 0.7rem 1rem; border: 0.5px solid var(--border); }
.stat-label { font-size: 11px; color: var(--text2); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.4px; }
.stat-val { font-size: 22px; font-weight: 500; }
.stat-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* ── progress ── */
.progress-bar { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; display: flex; margin-bottom: 6px; }
.pb-read { background: var(--success); transition: width 0.3s; }
.pb-reading { background: var(--warn); transition: width 0.3s; }
.legend { display: flex; gap: 14px; margin-bottom: 1.1rem; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.dot-read { background: var(--success); }
.dot-reading { background: var(--warn); }
.dot-unread { background: var(--border2); }

/* ── controls ── */
.controls { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.1rem; align-items: center; }
.search-wrap { flex: 1; min-width: 180px; }
.search-wrap input { width: 100%; font-size: 13px; padding: 6px 11px; border-radius: var(--radius-md); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); outline: none; }
.search-wrap input:focus { border-color: var(--info-border); }
.filter-wrap { display: flex; gap: 6px; flex-wrap: wrap; }
.cat-btn { font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; white-space: nowrap; }
.cat-btn:hover { background: var(--bg2); }
.cat-btn.active { background: var(--info-bg); color: var(--info-text); border-color: var(--info-border); }

/* ── category sections ── */
.category-section { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 9px; }
.cat-header { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 1rem; background: var(--bg2); cursor: pointer; user-select: none; gap: 8px; }
.cat-header:hover { background: var(--bg3); }
.cat-title { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; min-width: 0; }
.cat-title-input { font-size: 13px; font-weight: 500; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--info-border); background: var(--bg); color: var(--text); outline: none; flex: 1; min-width: 80px; max-width: 220px; }
.cat-meta { font-size: 12px; color: var(--text3); display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
.cat-edit-btn { font-size: 11px; padding: 2px 7px; border-radius: 4px; border: 0.5px solid var(--border2); background: transparent; color: var(--text3); cursor: pointer; }
.cat-edit-btn:hover { color: var(--info-text); border-color: var(--info-border); }
.cat-del-btn { font-size: 11px; padding: 2px 7px; border-radius: 4px; border: 0.5px solid var(--border2); background: transparent; color: var(--text3); cursor: pointer; }
.cat-del-btn:hover { color: var(--danger-text); border-color: var(--danger-border); }
.chevron { font-size: 9px; color: var(--text3); transition: transform 0.2s; display: inline-block; }
.chevron.open { transform: rotate(90deg); }

/* ── book rows ── */
.book-item { display: flex; align-items: center; gap: 8px; padding: 0.42rem 1rem; border-top: 0.5px solid var(--border); }
.book-num { font-size: 11px; color: var(--text3); min-width: 20px; text-align: right; flex-shrink: 0; }
.book-info { flex: 1; min-width: 0; }
.book-title { font-size: 13px; color: var(--text); line-height: 1.4; }
.book-author { font-size: 11px; color: var(--text3); margin-top: 1px; }
.book-actions { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.status-btn { width: 27px; height: 27px; border-radius: 50%; border: 1.5px solid var(--border2); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all 0.12s; flex-shrink: 0; }
.status-btn:hover { border-color: var(--text2); }
.status-btn.read { border-color: var(--success); background: var(--success-bg); color: var(--success); }
.status-btn.reading { border-color: var(--warn); background: var(--warn-bg); color: var(--warn); }
.del-btn { width: 22px; height: 22px; border-radius: 50%; border: 0.5px solid transparent; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--text3); flex-shrink: 0; line-height: 1; transition: all 0.12s; }
.del-btn:hover { color: var(--danger-text); border-color: var(--danger-border); background: var(--danger-bg); }

/* ── confirm overlay ── */
.confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 500; display: none; align-items: center; justify-content: center; }
.confirm-overlay.open { display: flex; }
.confirm-box { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border2); padding: 1.5rem; max-width: 340px; width: 90%; }
.confirm-title { font-size: 14px; font-weight: 500; margin-bottom: 8px; }
.confirm-msg { font-size: 13px; color: var(--text2); margin-bottom: 1.25rem; line-height: 1.5; }
.confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>

<header>
  <div class="logo">SwanSong™ <span>Reading Tracker</span></div>
  <div class="hdr-actions">
    <button class="btn btn-primary" onclick="toggleAddPanel()">+ Add book</button>
    <button class="btn" onclick="saveProgress()">Save</button>
    <span class="save-flash" id="saveFlash">Saved ✓</span>
  </div>
</header>

<!-- Add book panel -->
<div class="add-panel" id="addPanel">
  <div class="add-grid">
    <div class="field">
      <label>Title</label>
      <input type="text" id="newTitle" placeholder="Book title" />
    </div>
    <div class="field">
      <label>Author</label>
      <input type="text" id="newAuthor" placeholder="Author (optional)" />
    </div>
    <div class="field">
      <label>Category</label>
      <select id="newCat" onchange="onCatSelectChange()"></select>
    </div>
    <div style="display:flex;gap:6px;padding-bottom:1px;">
      <button class="btn btn-primary" onclick="addBook()">Add</button>
      <button class="btn" onclick="toggleAddPanel()">Cancel</button>
    </div>
  </div>
  <div class="new-cat-row" id="newCatRow">
    <input type="text" id="newCatName" placeholder="New category name…" />
  </div>
  <div class="add-err" id="addErr"></div>
</div>

<!-- Confirm dialog -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title" id="confirmTitle">Confirm</div>
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-actions">
      <button class="btn" onclick="closeConfirm()">Cancel</button>
      <button class="btn" id="confirmOkBtn" style="color:var(--danger-text);border-color:var(--danger-border);" onclick="confirmOk()">Delete</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="stats-row" id="statsRow"></div>
  <div class="progress-bar" id="progressBar"></div>
  <div class="legend">
    <span class="legend-item"><span class="dot dot-read"></span>Read</span>
    <span class="legend-item"><span class="dot dot-reading"></span>Reading</span>
    <span class="legend-item"><span class="dot dot-unread"></span>Unread</span>
    <span style="font-size:12px;color:var(--text3);">— click circle to cycle · × to delete</span>
  </div>
  <div class="controls">
    <div class="search-wrap"><input type="text" id="searchBox" placeholder="Search by title or author…" oninput="renderAll()" /></div>
    <div class="filter-wrap" id="filterWrap"></div>
  </div>
  <div id="bookList"></div>
</div>

// ── STATE ─────────────────────────────────────────────────────────────────────
let cats = [];
let status = {};
let openCats = {};
let activeFilter = 'all';
let confirmCallback = null;

// ── PERSISTENCE ───────────────────────────────────────────────────────────────
const SK = 'swansong_v3';

function persist() {
  try { localStorage.setItem(SK, JSON.stringify({ cats, status })); } catch(e){}
}

function load() {
  try {
    const raw = localStorage.getItem(SK);
    if (raw) {
      const d = JSON.parse(raw);
      cats = d.cats || JSON.parse(JSON.stringify(DEFAULT_CATS));
      status = d.status || {};
    } else {
      cats = JSON.parse(JSON.stringify(DEFAULT_CATS));
      status = {};
    }
  } catch(e) {
    cats = JSON.parse(JSON.stringify(DEFAULT_CATS));
    status = {};
  }
  cats.forEach(c => c.books.forEach((b,i) => {
    if (status[c.id+'_'+i] === undefined) status[c.id+'_'+i] = 0;
  }));
}

function saveProgress() {
  persist();
  const el = document.getElementById('saveFlash');
  el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 2000);
}

// ── ID GENERATOR ──────────────────────────────────────────────────────────────
function genId() { return 'c' + Date.now().toString(36) + Math.random().toString(36).slice(2,5); }

// ── ADD PANEL ─────────────────────────────────────────────────────────────────
function toggleAddPanel() {
  const p = document.getElementById('addPanel');
  const open = p.classList.toggle('open');
  if (open) { populateCatSelect(); document.getElementById('newTitle').focus(); }
  document.getElementById('addErr').style.display = 'none';
}

function populateCatSelect() {
  const sel = document.getElementById('newCat');
  sel.innerHTML = '';
  cats.forEach(c => {
    const o = document.createElement('option');
    o.value = c.id; o.textContent = c.label; sel.appendChild(o);
  });
  const divider = document.createElement('option'); divider.disabled = true; divider.textContent = '──────────'; sel.appendChild(divider);
  const newOpt = document.createElement('option'); newOpt.value = '__new__'; newOpt.textContent = '+ New category…'; sel.appendChild(newOpt);
}

function onCatSelectChange() {
  const val = document.getElementById('newCat').value;
  const row = document.getElementById('newCatRow');
  if (val === '__new__') { row.classList.add('open'); document.getElementById('newCatName').focus(); }
  else { row.classList.remove('open'); }
}

function addBook() {
  const title = document.getElementById('newTitle').value.trim();
  const author = document.getElementById('newAuthor').value.trim();
  let catId = document.getElementById('newCat').value;
  const errEl = document.getElementById('addErr');

  if (!title) { showErr('Please enter a book title.'); return; }

  if (catId === '__new__') {
    const newName = document.getElementById('newCatName').value.trim();
    if (!newName) { showErr('Please enter a name for the new category.'); return; }
    catId = genId();
    cats.push({ id: catId, label: newName, books: [] });
  }

  const cat = cats.find(c => c.id === catId);
  if (!cat) { showErr('Category not found.'); return; }

  const idx = cat.books.length;
  cat.books.push({ t: title, a: author });
  status[catId+'_'+idx] = 0;

  document.getElementById('newTitle').value = '';
  document.getElementById('newAuthor').value = '';
  document.getElementById('newCatName').value = '';
  document.getElementById('newCatRow').classList.remove('open');
  errEl.style.display = 'none';

  persist();
  populateCatSelect();
  document.getElementById('newCat').value = catId;
  openCats[catId] = true;
  renderAll();
  document.getElementById('newTitle').focus();
}

function showErr(msg) {
  const e = document.getElementById('addErr');
  e.textContent = msg; e.style.display = 'block';
}

// ── CONFIRM DIALOG ────────────────────────────────────────────────────────────
function openConfirm(title, msg, cb) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent = msg;
  confirmCallback = cb;
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('open');
  confirmCallback = null;
}
function confirmOk() {
  if (confirmCallback) confirmCallback();
  closeConfirm();
}

// ── DELETE BOOK ───────────────────────────────────────────────────────────────
function deleteBook(catId, idx) {
  const cat = cats.find(c => c.id === catId);
  if (!cat) return;
  const title = cat.books[idx].t;
  openConfirm('Delete book?', `"${title}" will be permanently removed from your list.`, () => {
    const newStatus = {};
    cats.forEach(c => {
      c.books.forEach((b, i) => {
        if (c.id === catId && i === idx) return;
        const newIdx = (c.id === catId && i > idx) ? i - 1 : i;
        newStatus[c.id+'_'+newIdx] = status[c.id+'_'+i] || 0;
      });
    });
    cat.books.splice(idx, 1);
    Object.keys(status).filter(k => k.startsWith(catId+'_')).forEach(k => delete status[k]);
    Object.assign(status, Object.fromEntries(Object.entries(newStatus).filter(([k]) => k.startsWith(catId+'_'))));
    cats.forEach(c => {
      if (c.id === catId) return;
      c.books.forEach((b,i) => { status[c.id+'_'+i] = newStatus[c.id+'_'+i] !== undefined ? newStatus[c.id+'_'+i] : (status[c.id+'_'+i] || 0); });
    });
    persist();
    renderAll();
  });
}

// ── DELETE CATEGORY ───────────────────────────────────────────────────────────
function deleteCategory(catId) {
  const cat = cats.find(c => c.id === catId);
  if (!cat) return;
  openConfirm('Delete category?', `"${cat.label}" and all ${cat.books.length} book(s) in it will be permanently removed.`, () => {
    Object.keys(status).filter(k => k.startsWith(catId+'_')).forEach(k => delete status[k]);
    cats = cats.filter(c => c.id !== catId);
    persist();
    if (activeFilter === catId) activeFilter = 'all';
    renderAll();
  });
}

// ── RENAME CATEGORY ───────────────────────────────────────────────────────────
function startRename(catId) {
  const titleEl = document.getElementById('cattitle_'+catId);
  const editBtn = document.getElementById('catedit_'+catId);
  if (!titleEl) return;
  const cur = cats.find(c => c.id === catId);
  if (!cur) return;
  const inp = document.createElement('input');
  inp.type = 'text'; inp.className = 'cat-title-input';
  inp.value = cur.label;
  inp.onclick = e => e.stopPropagation();
  inp.onkeydown = e => {
    if (e.key === 'Enter') finishRename(catId, inp.value);
    if (e.key === 'Escape') renderAll();
  };
  titleEl.replaceWith(inp);
  if (editBtn) { editBtn.textContent = 'Save'; editBtn.onclick = e => { e.stopPropagation(); finishRename(catId, inp.value); }; }
  inp.focus(); inp.select();
}

function finishRename(catId, newName) {
  const nm = newName.trim();
  if (!nm) { renderAll(); return; }
  const cat = cats.find(c => c.id === catId);
  if (cat) cat.label = nm;
  persist();
  renderAll();
}

// ── STATUS CYCLE ──────────────────────────────────────────────────────────────
function cycleStatus(catId, idx) {
  const k = catId+'_'+idx;
  status[k] = ((status[k] || 0) + 1) % 3;
  persist();
  renderAll();
}

// ── FILTER ────────────────────────────────────────────────────────────────────
function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  renderAll();
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function getStats() {
  let total=0, read=0, reading=0;
  cats.forEach(c => c.books.forEach((b,i) => {
    total++;
    const s = status[c.id+'_'+i] || 0;
    if (s===1) read++; if (s===2) reading++;
  }));
  return {total, read, reading, unread: total-read-reading};
}

// ── RENDER FILTER BUTTONS ─────────────────────────────────────────────────────
function renderFilters() {
  const fw = document.getElementById('filterWrap');
  fw.innerHTML = '';
  cats.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (activeFilter===c.id?' active':'');
    btn.textContent = c.label;
    btn.onclick = function(){ setFilter(c.id, this); };
    fw.appendChild(btn);
  });
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function renderAll() {
  // stats
  const {total, read, reading, unread} = getStats();
  const pR = total ? Math.round(read/total*100) : 0;
  const pRi = total ? Math.round(reading/total*100) : 0;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-val">${total}</div><div class="stat-sub">${cats.length} categories</div></div>
    <div class="stat-card"><div class="stat-label">Read</div><div class="stat-val" style="color:var(--success)">${read}</div><div class="stat-sub">${pR}%</div></div>
    <div class="stat-card"><div class="stat-label">Reading</div><div class="stat-val" style="color:var(--warn)">${reading}</div><div class="stat-sub">${pRi}%</div></div>
    <div class="stat-card"><div class="stat-label">Unread</div><div class="stat-val" style="color:var(--text2)">${unread}</div><div class="stat-sub">${100-pR-pRi}%</div></div>`;
  document.getElementById('progressBar').innerHTML =
    `<div class="pb-read" style="width:${pR}%"></div><div class="pb-reading" style="width:${pRi}%"></div>`;

  // filter buttons (All + per cat)
  const fw = document.getElementById('filterWrap');
  fw.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'cat-btn' + (activeFilter==='all' ? ' active' : '');
  allBtn.textContent = 'All';
  allBtn.onclick = function(){ setFilter('all', this); };
  fw.appendChild(allBtn);
  
  cats.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (activeFilter===c.id?' active':'');
    btn.textContent = c.label;
    btn.onclick = function(){ setFilter(c.id, this); };
    fw.appendChild(btn);
  });

  // book list
  const search = (document.getElementById('searchBox').value || '').toLowerCase();
  const catsToShow = activeFilter==='all' ? cats : cats.filter(c => c.id===activeFilter);
  let html = '';

  catsToShow.forEach(cat => {
    const filtered = cat.books.map((b,i) => ({b,i})).filter(({b}) =>
      !search || b.t.toLowerCase().includes(search) || (b.a||'').toLowerCase().includes(search)
    );
    if (!filtered.length && search) return;
    const rc = cat.books.filter((b,i) => (status[cat.id+'_'+i]||0)===1).length;
    const rdc = cat.books.filter((b,i) => (status[cat.id+'_'+i]||0)===2).length;
    const isOpen = openCats[cat.id] !== false;

    html += `<div class="category-section">
      <div class="cat-header" onclick="toggleCat('${cat.id}')">
        <span class="cat-title" id="cattitle_${cat.id}">${esc(cat.label)}</span>
        <div class="cat-meta">
          ${rc>0?`<span class="dot dot-read"></span><span>${rc}</span>`:''}
          ${rdc>0?`<span class="dot dot-reading"></span><span>${rdc}</span>`:''}
          <span>${cat.books.length} books</span>
          <button class="cat-edit-btn" id="catedit_${cat.id}" onclick="event.stopPropagation();startRename('${cat.id}')">rename</button>
          <button class="cat-del-btn" onclick="event.stopPropagation();deleteCategory('${cat.id}')">delete</button>
          <span class="chevron ${isOpen?'open':''}">▶</span>
        </div>
      </div>`;

    if (isOpen) {
      html += `<div>`;
      (search ? filtered : cat.books.map((b,i)=>({b,i}))).forEach(({b,i}) => {
        const s = status[cat.id+'_'+i] || 0;
        const cls = s===1?'read':s===2?'reading':'';
        const icon = s===1?'✓':s===2?'◐':'';
        const tip = s===0?'Mark as read':s===1?'Mark as reading':'Mark as unread';
        html += `<div class="book-item">
          <span class="book-num">${i+1}</span>
          <div class="book-info">
            <div class="book-title">${esc(b.t)}</div>
            ${b.a?`<div class="book-author">${esc(b.a)}</div>`:''}
          </div>
          <div class="book-actions">
            <button class="status-btn ${cls}" onclick="cycleStatus('${cat.id}',${i})" title="${tip}">${icon}</button>
            <button class="del-btn" onclick="deleteBook('${cat.id}',${i})" title="Remove book">×</button>
          </div>
        </div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });

  document.getElementById('bookList').innerHTML = html;
}

function toggleCat(id) {
  openCats[id] = openCats[id]===false ? true : false;
  renderAll();
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
load();
renderAll();
